        runs-on:
          - self.hosted
          - linux.shell
          - preview.runner
        script:
          - |
            # PR-only guard: run this step only when PR targets develop
            if [ -n "$BITBUCKET_PR_ID" ] && [ "${BITBUCKET_PR_DESTINATION_BRANCH}" != "develop" ]; then
              echo "Skipping: PR target=${BITBUCKET_PR_DESTINATION_BRANCH} (want develop)"
              exit 0
            fi
            if [ -d "shared-pipelines" ]; then
              echo "shared-pipelines directory already exists"
            else
              echo "shared-pipelines directory does not exist, cloning..."
              git clone git@bitbucket.org:protocol33/shared-pipelines.git
            fi
            
            # Make all scripts executable with better error handling
            echo "Making scripts executable..."
            find shared-pipelines/scripts -type f -name "*.sh" -exec chmod +x {} \; || {
              echo "WARNING: Some scripts may not have been made executable"
            }
            
            # Specifically ensure the nginx script is executable
            chmod +x shared-pipelines/scripts/preview/nginx/install_or_update_preview_proxy.sh || {
              echo "ERROR: Failed to make nginx script executable"
              exit 1
            }
            
            echo "Running nginx setup script..."
            INTERNAL_DNS_ZONE="internal.${DOMAIN_NAME}" ./shared-pipelines/scripts/preview/nginx/install_or_update_preview_proxy.sh || {
              echo "ERROR: Nginx setup script failed"
              exit 1
            }
            
            echo "✅ Nginx preview proxy configured/verified successfully"

    - step: &deploy-preview
        name: 👀 Deploy Preview (PR → develop)
        runs-on:
          - self.hosted
          - linux.shell
          - preview.runner
        script:
          - |
            # PR-only guard: run this step only when PR targets develop
            if [ -n "$BITBUCKET_PR_ID" ] && [ "${BITBUCKET_PR_DESTINATION_BRANCH}" != "develop" ]; then
              echo "Skipping: PR target=${BITBUCKET_PR_DESTINATION_BRANCH} (want develop)"
              exit 0
            fi
            if [ "$BITBUCKET_PR_DESTINATION_BRANCH" != "develop" ]; then
              echo "Not a PR to develop; skipping preview deploy."
              exit 0
            fi
            
            if [ -z "$BITBUCKET_PR_ID" ]; then
              echo "No PR context; skipping preview deploy."
              exit 0
            fi
            
            if [ -d "shared-pipelines" ]; then
              echo "shared-pipelines directory already exists"
            else
              echo "shared-pipelines directory does not exist, cloning..."
              git clone git@bitbucket.org:protocol33/shared-pipelines.git
            fi
            # Prepare Docker CLI environment to target the local daemon via a Unix socket.
            export DOCKER_HOST="unix:///var/run/docker.sock"
            
            # Make all scripts executable with better error handling
            echo "Making scripts executable..."
            find shared-pipelines/scripts -type f -name "*.sh" -exec chmod +x {} \; || {
              echo "WARNING: Some scripts may not have been made executable"
            }
            
            # Docker login with error checking
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin || {
              echo "ERROR: Docker login failed"
              exit 1
            }
            
            # Allocate a free preview port within fixed range
            chmod +x shared-pipelines/scripts/preview/allocate_port.sh || {
              echo "ERROR: Failed to make allocate_port script executable"
              exit 1
            }
            PREVIEW_PORT_START=${PREVIEW_PORT_START:-40000} PREVIEW_PORT_SIZE=${PREVIEW_PORT_SIZE:-25} \
            ./shared-pipelines/scripts/preview/allocate_port.sh
            export PORT=$(cat preview_port.txt)
          - |
            # Compose up for preview
            export PR_TAG="pr-${BITBUCKET_PR_ID}"
            export COMPOSE_PROJECT_NAME="preview-${BITBUCKET_PR_ID}"
            
            # Clean up any existing containers with the same project name
            docker-compose -f docker-compose.prod.yml down || true
            
            cat > docker-compose.override.yml << 'COMPOSE_EOF'
            services:
              app:
                image: ${DOCKERHUB_ORGNAME}/${BITBUCKET_REPO_SLUG}:pr-${BITBUCKET_PR_ID}
                ports:
                  - "${PORT}:3000"
                env_file:
                  - .env  
            COMPOSE_EOF
            docker-compose -f docker-compose.prod.yml -f docker-compose.override.yml up -d
            sleep 10
            curl -sf http://localhost:${PORT}/health

            # DNS create (internal) - Disabled; I'm using a wildcard entry for the preview domain under BIND as *.internal.{DOMAIN_NAME}
            # export ENVIRONMENT=${ENVIRONMENT:-preview}
            # DNS_NAME=$(./shared-pipelines/scripts/dns/dns_create.sh)
            # export PREVIEW_URL="https://${DNS_NAME}"
            
          - |
            # Create per-host Nginx site and reload (uses preview_port.txt)
            INTERNAL_DNS_ZONE="internal.${DOMAIN_NAME}" ./shared-pipelines/scripts/preview/nginx/nginx_enable_site.sh || true
          - |
            if [ -n "$BITBUCKET_USERNAME" ] && [ -n "$BITBUCKET_APP_PASSWORD" ]; then
              export BITBUCKET_REPO_OWNER=${BITBUCKET_REPO_OWNER:-$BITBUCKET_WORKSPACE}
              export BITBUCKET_REPO_SLUG=${BITBUCKET_REPO_SLUG:-$BITBUCKET_REPO_SLUG}
              ./shared-pipelines/scripts/preview/pr_comment.sh || true
            fi

    - step: &teardown-preview
        name: 🧹 Teardown Preview (PR closed/merged)
        trigger: manual
        runs-on:
          - self.hosted
          - linux.shell
          - preview.runner
        script:
          - |
            if [ -z "$BITBUCKET_PR_ID" ]; then
              echo "No PR context; skipping preview teardown."
              exit 0
            fi
            
            if [ -d "shared-pipelines" ]; then
              echo "shared-pipelines directory already exists"
            else
              echo "shared-pipelines directory does not exist, cloning..."
              git clone git@bitbucket.org:protocol33/shared-pipelines.git
            fi

            # Prepare Docker CLI environment to target the local daemon via a Unix socket.
            export DOCKER_HOST="unix:///var/run/docker.sock"
            
            # Make all scripts executable with better error handling
            echo "Making scripts executable..."
            find shared-pipelines/scripts -type f -name "*.sh" -exec chmod +x {} \; || {
              echo "WARNING: Some scripts may not have been made executable"
            }
            
            # Compose down for preview
            export COMPOSE_PROJECT_NAME="preview-${BITBUCKET_PR_ID}"
            
            export DOCKER_HOST="unix:///var/run/docker.sock"
            docker-compose -f docker-compose.prod.yml down || true
            
            # Remove per-host Nginx site and reload
            chmod +x shared-pipelines/scripts/preview/nginx/nginx_disable_site.sh || {
              echo "WARNING: Failed to make nginx_disable_site script executable"
            }
            INTERNAL_DNS_ZONE="internal.${DOMAIN_NAME}" ./shared-pipelines/scripts/preview/nginx/nginx_disable_site.sh || true
            
            # DNS delete (internal) - Disabled; I'm using a wildcard entry for the preview domain under BIND as *.internal.{DOMAIN_NAME}
            # export ENVIRONMENT=${ENVIRONMENT:-preview}
            # chmod +x shared-pipelines/scripts/dns/dns_delete.sh || {
            #   echo "WARNING: Failed to make dns_delete script executable"
            # }
            # ./shared-pipelines/scripts/dns/dns_delete.sh || true

  pipelines:
    # ========================================
    # CHOOSE THE RIGHT PIPELINE FOR YOUR PROJECT:
    # 
    # 🐳 NODE.JS/BACKEND PROJECTS:
    #   - general-pipeline-develop: For Node.js/Express/API projects
    #   - general-pipeline-pr: For Node.js PRs 
    #
    # 🐳 NEXT.JS/FRONTEND PROJECTS:
    #   - general-pipeline-develop-nextjs: For Next.js projects
    #   - general-pipeline-pr-nextjs: For Next.js PRs 
    #
    # 📋 OTHER PIPELINES:
    #   - general-pipeline-release: For UAT deployments
    #   - general-pipeline-main: For production deployments
    #   - deploy-production: Manual production deployment
    #   - manual-preview-teardown: Clean up any PR preview
    # ========================================
    
    general-pipeline-develop-nodejs:
      - step: *setup-shared-pipelines
      - step: *setup-env
      - step: *lint
      - step: *test
      - step: *sonar
      - step: *build-nodejs
      - step: *scout
      - step: *deploy-dev

    general-pipeline-develop-nextjs:
      - step: *setup-shared-pipelines
      - step: *setup-env
      - step: *lint
      - step: *test
      - step: *sonar
      - step: *build-nextjs
      - step: *deploy-dev

    general-pipeline-release:
      - step: *setup-shared-pipelines
      - step: *setup-env
      - step: *sonar
      - step: *promote-uat
      - step: *scout
      - step: *deploy-uat

    general-pipeline-main:
      - step: *setup-shared-pipelines
      - step: *setup-env
      - step: *sonar
      - step: *promote-prod
      - step: *scout

    deploy-production:
      - step: *setup-shared-pipelines
      - step: *setup-env
      - step: *deploy-prod

    general-pipeline-pr-nodejs:
      - step: *setup-shared-pipelines
      - step: *setup-env
      - step: *lint
      - step: *test
      - step: *sonar
      - step: *build-nodejs
      - step: *scout
      - step: *setup-preview-nginx
      - step: *deploy-preview
      - step: *teardown-preview
      - step: *teardown-sonar 

    general-pipeline-pr-nextjs:
      - step: *setup-shared-pipelines
      - step: *setup-env
      - step: *lint
      - step: *test
      - step: *sonar
      - step: *build-nextjs
      - step: *setup-preview-nginx
      - step: *deploy-preview
      - step: *teardown-preview
      - step: *teardown-sonar 

    # preview-teardown:
    #   - step: *teardown-preview
      
    # Manual preview teardown - allows manual cleanup of any PR
    manual-preview-teardown:
      - variables:
        - name: BITBUCKET_PR_ID
          description: "PR number to teardown (e.g., 101)"
          default: "" 
      - step: *teardown-preview
      - step: *teardown-sonar    
